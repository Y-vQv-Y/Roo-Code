name: Code QA ADTEC Code

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, ready_for_review, synchronize]
        branches: [main]

jobs:
    check-translations:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Verify all translations are complete
              run: node scripts/find-missing-translations.js

    knip:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Run knip checks
              run: pnpm knip

    compile:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Lint
              run: pnpm lint
            - name: Check types
              run: pnpm check-types
            # Keep declaration generation in the push/PR gate. The regular
            # check-types task does not exercise tsup's DTS worker, which is
            # the path used by the VSIX build.
            - name: Build shared type declarations
              run: pnpm --filter @roo-code/types build
            # Use the same Turbo dependency graph and VSIX entry point as the
            # release workflow. This builds the webview, shared packages and
            # extension bundle before validating VSIX packaging.
            - name: Package VS Code extension
              run: pnpm vsix
            - name: Upload VSIX artifact
              uses: actions/upload-artifact@v4
              with:
                  name: adtec-code-vsix-${{ github.sha }}
                  path: bin/*.vsix
                  if-no-files-found: error
            - name: Build CLI
              run: pnpm --filter @adtec-code/cli build
            - name: Build Web Server
              run: pnpm --filter @adtec-code/web-server build
            - name: Build Web Client
              run: pnpm --filter @adtec-code/web build
            - name: Upload Web artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: adtec-code-web-${{ github.sha }}
                  path: |
                      apps/web-server/dist/**
                      apps/web/dist/**
                  if-no-files-found: error

    unit-test:
        name: platform-unit-test (${{ matrix.name }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      name: ubuntu-latest
                    - os: windows-latest
                      name: windows-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Run unit tests
              run: pnpm test
