name: CLI Package Build

on:
  workflow_call:
    inputs:
      release_sha:
        description: 'Commit to package.'
        required: true
        type: string
      version:
        description: 'Unified ADTEC Code release version.'
        required: true
        type: string

jobs:
  # Build CLI for each platform.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            runs-on: macos-latest
            node-arch: arm64
          - os: macos-15-intel
            platform: macos-x64
            runs-on: macos-15-intel
            node-arch: x64
          - os: ubuntu-latest
            platform: linux-x64
            runs-on: ubuntu-latest
            node-arch: x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            runs-on: ubuntu-24.04-arm
            node-arch: arm64
          - os: windows-latest
            platform: windows-x64
            runs-on: windows-latest
            node-arch: x64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_sha }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify runner architecture
        shell: bash
        run: node -e "if (process.arch !== '${{ matrix.node-arch }}') throw new Error('Expected ${{ matrix.node-arch }} runner, received ' + process.arch)"

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Build extension bundle
        run: pnpm bundle

      - name: Build CLI
        run: pnpm --filter @adtec-code/cli build

      - name: Create Unix release archive
        if: runner.os != 'Windows'
        id: tarball
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          RELEASE_DIR="adtec-code-cli-${PLATFORM}"
          TARBALL="adtec-code-cli-${PLATFORM}.tar.gz"

          # Clean up any previous build.
          rm -rf "$RELEASE_DIR"
          rm -f "$TARBALL"

          # Create directory structure.
          mkdir -p "$RELEASE_DIR/bin"
          mkdir -p "$RELEASE_DIR/lib"
          mkdir -p "$RELEASE_DIR/extension"

          # Copy CLI dist files.
          echo "Copying CLI files..."
          cp -r apps/cli/dist/* "$RELEASE_DIR/lib/"

          # Create package.json for npm install.
          echo "Creating package.json..."
          node -e "
            const pkg = require('./apps/cli/package.json');
            const newPkg = {
              name: '@adtec-code/cli',
              version: '$VERSION',
              type: 'module',
              dependencies: {
                '@inkjs/ui': pkg.dependencies['@inkjs/ui'],
                '@trpc/client': pkg.dependencies['@trpc/client'],
                'commander': pkg.dependencies.commander,
                'fuzzysort': pkg.dependencies.fuzzysort,
                'ink': pkg.dependencies.ink,
                'p-wait-for': pkg.dependencies['p-wait-for'],
                'react': pkg.dependencies.react,
                'superjson': pkg.dependencies.superjson,
                'zustand': pkg.dependencies.zustand
              }
            };
            console.log(JSON.stringify(newPkg, null, 2));
          " > "$RELEASE_DIR/package.json"

          # Copy extension bundle.
          echo "Copying extension bundle..."
          cp -r src/dist/* "$RELEASE_DIR/extension/"

          # Bundled skills are runtime resources, not part of the extension JS bundle.
          echo "Copying bundled skills..."
          mkdir -p "$RELEASE_DIR/extension/builtin-skills"
          cp -r src/builtin-skills/* "$RELEASE_DIR/extension/builtin-skills/"

          # Add package.json to extension directory for CommonJS.
          echo '{"type": "commonjs"}' > "$RELEASE_DIR/extension/package.json"

          # Find and copy ripgrep binary.
          echo "Looking for ripgrep binary..."
          RIPGREP_PATH=$(find node_modules -path "*/@vscode/ripgrep/bin/rg" -type f 2>/dev/null | head -1)
          if [ -n "$RIPGREP_PATH" ] && [ -f "$RIPGREP_PATH" ]; then
            echo "Found ripgrep at: $RIPGREP_PATH"
            mkdir -p "$RELEASE_DIR/node_modules/@vscode/ripgrep/bin"
            cp "$RIPGREP_PATH" "$RELEASE_DIR/node_modules/@vscode/ripgrep/bin/"
            chmod +x "$RELEASE_DIR/node_modules/@vscode/ripgrep/bin/rg"
            mkdir -p "$RELEASE_DIR/bin"
            cp "$RIPGREP_PATH" "$RELEASE_DIR/bin/"
            chmod +x "$RELEASE_DIR/bin/rg"
          else
            echo "Required ripgrep binary not found"
            exit 1
          fi

          # Create the wrapper script
          echo "Creating wrapper script..."
          printf '%s\n' '#!/usr/bin/env node' \
            '' \
            "import { fileURLToPath } from 'url';" \
            "import { dirname, join } from 'path';" \
            '' \
            'const __filename = fileURLToPath(import.meta.url);' \
            'const __dirname = dirname(__filename);' \
            '' \
            '// Set environment variables for the CLI' \
            "process.env.ADTEC_CODE_CLI_ROOT = join(__dirname, '..');" \
            "process.env.ADTEC_CODE_EXTENSION_PATH = join(__dirname, '..', 'extension');" \
            "process.env.ADTEC_CODE_RIPGREP_PATH = join(__dirname, 'rg');" \
            '' \
            '// Import and run the actual CLI' \
            "await import(join(__dirname, '..', 'lib', 'index.js'));" \
            > "$RELEASE_DIR/bin/adtec-code"

          chmod +x "$RELEASE_DIR/bin/adtec-code"

          # Create tarball.
          echo "Creating tarball..."
          tar -czvf "$TARBALL" "$RELEASE_DIR"

          # Clean up release directory.
          rm -rf "$RELEASE_DIR"

          # Create checksum.
          if command -v sha256sum &> /dev/null; then
            sha256sum "$TARBALL" > "${TARBALL}.sha256"
          elif command -v shasum &> /dev/null; then
            shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          fi

          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT
          echo "Created: $TARBALL"
          ls -la "$TARBALL"

      - name: Verify Unix release archive
        if: runner.os != 'Windows'
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          TARBALL="adtec-code-cli-${PLATFORM}.tar.gz"

          # Create temp directory for verification.
          VERIFY_DIR=$(mktemp -d)

          # Extract and verify structure.
          tar -xzf "$TARBALL" -C "$VERIFY_DIR"

          echo "Verifying tarball contents..."
          ls -la "$VERIFY_DIR/adtec-code-cli-${PLATFORM}/"

          # Check required files exist.
          test -f "$VERIFY_DIR/adtec-code-cli-${PLATFORM}/bin/adtec-code" || { echo "Missing bin/adtec-code"; exit 1; }
          test -f "$VERIFY_DIR/adtec-code-cli-${PLATFORM}/lib/index.js" || { echo "Missing lib/index.js"; exit 1; }
          test -f "$VERIFY_DIR/adtec-code-cli-${PLATFORM}/package.json" || { echo "Missing package.json"; exit 1; }
          test -d "$VERIFY_DIR/adtec-code-cli-${PLATFORM}/extension" || { echo "Missing extension directory"; exit 1; }
          test -f "$VERIFY_DIR/adtec-code-cli-${PLATFORM}/extension/builtin-skills/adtec-test/SKILL.md" || { echo "Missing bundled skill"; exit 1; }
          grep -Fq "ADTEC bundled skill loaded successfully." "$VERIFY_DIR/adtec-code-cli-${PLATFORM}/extension/builtin-skills/adtec-test/SKILL.md" || { echo "Invalid bundled skill"; exit 1; }

          (
            cd "$VERIFY_DIR/adtec-code-cli-${PLATFORM}"
            npm install --omit=dev --silent
            ADTEC_CODE_CLI_ROOT="$PWD" \
            ADTEC_CODE_EXTENSION_PATH="$PWD/extension" \
            ADTEC_CODE_RIPGREP_PATH="$PWD/bin/rg" \
            "$PWD/bin/adtec-code" --help >/dev/null
            ADTEC_CODE_CLI_ROOT="$PWD" \
            ADTEC_CODE_EXTENSION_PATH="$PWD/extension" \
            ADTEC_CODE_RIPGREP_PATH="$PWD/bin/rg" \
            "$PWD/bin/adtec-code" --version >/dev/null
          )

          echo "Unix archive verification passed!"

          # Cleanup.
          rm -rf "$VERIFY_DIR"

      - name: Create Windows release archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: ./apps/cli/scripts/package-windows.ps1 -Version $env:VERSION -Platform $env:PLATFORM

      - name: Verify Windows release archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          $ErrorActionPreference = 'Stop'
          $archive = "adtec-code-cli-$env:PLATFORM.zip"
          $verifyDirectory = Join-Path $env:RUNNER_TEMP "adtec-code-cli-verify"
          if (Test-Path -LiteralPath $verifyDirectory) { Remove-Item -LiteralPath $verifyDirectory -Recurse -Force }
          Expand-Archive -LiteralPath $archive -DestinationPath $verifyDirectory -Force
          $root = Join-Path $verifyDirectory "adtec-code-cli-$env:PLATFORM"
          foreach ($requiredPath in @(
            'bin\adtec-code.cmd',
            'bin\rg.exe',
            'lib\index.js',
            'package.json',
            'extension\builtin-skills\adtec-test\SKILL.md'
          )) {
            if (-not (Test-Path -LiteralPath (Join-Path $root $requiredPath))) {
              throw "Missing required Windows archive path: $requiredPath"
            }
          }
          Push-Location $root
          try {
            npm install --omit=dev --silent
            if ($LASTEXITCODE -ne 0) { throw 'npm install failed for Windows archive' }
            & (Join-Path $root 'bin\adtec-code.cmd') --help | Out-Null
            if ($LASTEXITCODE -ne 0) { throw 'Windows CLI --help check failed' }
            & (Join-Path $root 'bin\adtec-code.cmd') --version | Out-Null
            if ($LASTEXITCODE -ne 0) { throw 'Windows CLI --version check failed' }
          } finally {
            Pop-Location
          }
          Write-Host 'Windows archive verification passed!'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: |
            adtec-code-cli-${{ matrix.platform }}.tar.gz
            adtec-code-cli-${{ matrix.platform }}.tar.gz.sha256
            adtec-code-cli-${{ matrix.platform }}.zip
            adtec-code-cli-${{ matrix.platform }}.zip.sha256
          if-no-files-found: error
          retention-days: 7
