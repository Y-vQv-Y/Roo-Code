name: Package and Release ADTEC Code

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

env:
  GIT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

jobs:
  publish-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing tags.
    if: >
        ( github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        contains(github.event.pull_request.title, 'Changeset version bump') ) ||
        github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_REF }}
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-args: '--frozen-lockfile'
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Package Extension
        run: |
          package_name=$(node -p "require('./src/package.json').name")
          current_package_version=$(node -p "require('./src/package.json').version")
          vsix_path="bin/${package_name}-${current_package_version}.vsix"
          pnpm vsix

          # Save VSIX contents to a temporary file to avoid broken pipe issues.
          test -f "$vsix_path"
          unzip -l "$vsix_path" > /tmp/adtec-code-vsix-contents.txt

          # Check for required files.
          grep -q "extension/package.json" /tmp/adtec-code-vsix-contents.txt || exit 1
          grep -q "extension/package.nls.json" /tmp/adtec-code-vsix-contents.txt || exit 1
          grep -q "extension/dist/extension.js" /tmp/adtec-code-vsix-contents.txt || exit 1
          grep -q "extension/webview-ui/audio/celebration.wav" /tmp/adtec-code-vsix-contents.txt || exit 1
          grep -q "extension/webview-ui/build/assets/index.js" /tmp/adtec-code-vsix-contents.txt || exit 1
          grep -q "extension/assets/codicons/codicon.ttf" /tmp/adtec-code-vsix-contents.txt || exit 1
          grep -q "extension/assets/vscode-material-icons/icons/3d.svg" /tmp/adtec-code-vsix-contents.txt || exit 1
          grep -q "extension/assets/icons/adtec-logo.png" /tmp/adtec-code-vsix-contents.txt || exit 1
          grep -q "extension/builtin-skills/adtec-test/SKILL.md" /tmp/adtec-code-vsix-contents.txt || exit 1

          # Verify the installed extension metadata and bundled skill contract.
          unzip -p "$vsix_path" extension/package.json | grep -Fq '"name": "adtec-code"' || exit 1
          unzip -p "$vsix_path" extension/package.json | grep -Fq '"publisher": "ADTEC"' || exit 1
          unzip -p "$vsix_path" extension/builtin-skills/adtec-test/SKILL.md | grep -Fq 'name: adtec-test' || exit 1
          unzip -p "$vsix_path" extension/builtin-skills/adtec-test/SKILL.md | grep -Fq 'ADTEC bundled skill loaded successfully.' || exit 1

          # Do not ship local secrets or legacy source-project branding.
          ! grep -q "extension/.env" /tmp/adtec-code-vsix-contents.txt || exit 1
          ! grep -q "extension/assets/icons/icon.svg" /tmp/adtec-code-vsix-contents.txt || exit 1
          
          # Clean up temporary file.
          rm /tmp/adtec-code-vsix-contents.txt
      - name: Create and Push Git Tag
        run: |
          current_package_version=$(node -p "require('./src/package.json').version")
          git tag -a "v${current_package_version}" -m "Release v${current_package_version}"
          git push origin "v${current_package_version}" --no-verify
          echo "Successfully created and pushed git tag v${current_package_version}"
      # Public Marketplace publishing is disabled for internal ADTEC Code distributions.
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          package_name=$(node -p "require('./src/package.json').name")
          current_package_version=$(node -p "require('./src/package.json').version")
          vsix_path="bin/${package_name}-${current_package_version}.vsix"

          # Extract changelog for current version
          echo "Extracting changelog for version ${current_package_version}"
          changelog_content=$(awk -v version="${current_package_version}" '
            $0 == "## " version || $0 == "## [" version "]" {
              capture = 1
              next
            }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md)

          # If changelog extraction failed, use a default message
          if [ -z "$changelog_content" ]; then
            echo "Warning: No changelog section found for version ${current_package_version}"
            changelog_content="Release v${current_package_version}"
          else
            echo "Found changelog section for version ${current_package_version}"
          fi

          # Create release with changelog content
          gh release create "v${current_package_version}" \
            --title "Release v${current_package_version}" \
            --notes "$changelog_content" \
            --target ${{ env.GIT_REF }} \
            "$vsix_path"
          echo "Successfully created GitHub Release v${current_package_version}"
