name: Package ADTEC Code Nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  package-nightly:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-args: '--frozen-lockfile'
      - name: Forge numeric nightly version
        id: version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: echo "number=$((5500 + RUN_NUMBER))" >> "$GITHUB_OUTPUT"
      - name: Patch package.json version
        env:
          VERSION_NUMBER: ${{ steps.version.outputs.number }}
        run: |
          node <<'EOF'
            const fs = require('fs');
            const path = require('path');
            const pkgPath = path.join(__dirname, 'apps', 'vscode-nightly', 'package.nightly.json');
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            const [major, minor] = pkg.version.split('.');
            pkg.version = `${major}.${minor}.${process.env.VERSION_NUMBER}`;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            console.log(`Nightly version set to ${pkg.version}`);
          EOF
      - name: Build VSIX
        run: pnpm vsix:nightly
      - name: Upload internal nightly artifact
        uses: actions/upload-artifact@v4
        with:
          name: adtec-code-nightly-${{ steps.version.outputs.number }}
          path: bin/adtec-code-nightly-*.vsix
          if-no-files-found: error
          retention-days: 7
